version: 2

project_name: shroudenv

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: shroudenv
    ldflags:
      - -s -w -X shroudenv/cmd.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: shroudenv
    repository:
      owner: gitvadim
      name: homebrew-shroudenv
    directory: Formula
    homepage: "https://github.com/gitvadim/shroudenv"
    description: "Manage and protect environment variables cleanly"
    license: "MIT"

scoops:
  - name: shroudenv
    repository:
      owner: gitvadim
      name: scoop-shroudenv
    homepage: "https://github.com/gitvadim/shroudenv"
    description: "Manage and protect environment variables cleanly"
    license: "MIT"
