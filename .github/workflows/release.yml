name: Test and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run Tests
        run: go test ./... -v

  release:
    name: Build & Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build Binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          
          # Clean version name (strip leading 'v' if present for build info)
          CLEAN_VERSION=$(echo "${VERSION}" | sed 's/^v//')
          
          LDFLAGS="-s -w -X shroudenv/cmd.Version=${CLEAN_VERSION}"
          
          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/shroudenv-linux-amd64 main.go
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/shroudenv-linux-arm64 main.go
          
          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/shroudenv-darwin-amd64 main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/shroudenv-darwin-arm64 main.go
          
          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/shroudenv-windows-amd64.exe main.go
          GOOS=windows GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/shroudenv-windows-arm64.exe main.go

      - name: Package Assets
        run: |
          cd dist
          
          # Compress Linux binaries
          tar -czf shroudenv-linux-amd64.tar.gz shroudenv-linux-amd64
          tar -czf shroudenv-linux-arm64.tar.gz shroudenv-linux-arm64
          
          # Compress macOS binaries
          tar -czf shroudenv-darwin-amd64.tar.gz shroudenv-darwin-amd64
          tar -czf shroudenv-darwin-arm64.tar.gz shroudenv-darwin-arm64
          
          # Compress Windows binaries
          zip shroudenv-windows-amd64.zip shroudenv-windows-amd64.exe
          zip shroudenv-windows-arm64.zip shroudenv-windows-arm64.exe
          
          # Clean up uncompressed binaries
          rm shroudenv-linux-amd64 shroudenv-linux-arm64 shroudenv-darwin-amd64 shroudenv-darwin-arm64 shroudenv-windows-amd64.exe shroudenv-windows-arm64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/shroudenv-linux-amd64.tar.gz
            dist/shroudenv-linux-arm64.tar.gz
            dist/shroudenv-darwin-amd64.tar.gz
            dist/shroudenv-darwin-arm64.tar.gz
            dist/shroudenv-windows-amd64.zip
            dist/shroudenv-windows-arm64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
